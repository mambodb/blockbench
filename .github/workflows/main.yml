name: Build and Auto-Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          # Updated to Node 22 to satisfy package requirements
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies 📦
        run: npm install

      - name: Build Project 🏗️
        run: npm run build

      - name: Zip Dist Folder 📂
        run: zip -rj build-artifact.zip dist/

      - name: Create Release 🚀
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: Master Build ${{ github.run_number }}
          files: build-artifact.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
